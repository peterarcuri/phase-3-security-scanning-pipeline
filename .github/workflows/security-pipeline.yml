name: Phase 3 Security Scanning Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-scans:
    name: SAST SCA DAST Security Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest -v

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run SAST with Bandit SARIF
        run: |
          bandit -r src \
            -f sarif \
            -o reports/bandit-results.sarif \
            --severity-level high \
            --confidence-level medium

      - name: Upload Bandit SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/bandit-results.sarif
          category: bandit-sast

      - name: Run SCA with Trivy SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: reports/trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/trivy-results.sarif
          category: trivy-sca

      - name: Enforce Trivy HIGH/CRITICAL failure gate
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Run DAST OWASP smoke tests
        run: |
          PYTHONPATH=. python -m src.main
          echo "DAST smoke tests completed successfully" > reports/dast-results.txt    

      - name: Upload security report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phase-3-security-reports
          path: reports/
