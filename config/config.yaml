
target:
  base_url: "http://localhost:5000"
  test_parameter: "q"


endpoints:
  sql_injection: "/search"
  ssrf: "/fetch"
  cors: "/"
  headers: "/"


sql_injection:
  payloads:
    - "' OR 1=1 --"


ssrf:
  test_urls:
    - "http://127.0.0.1:80"
    - "http://169.254.169.254/latest/meta-data"


headers:
  required:
    - "Content-Security-Policy"
    - "X-Frame-Options"
    - "X-Content-Type-Options"


report:
  output_file: "reports/dast-results.json"